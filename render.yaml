# Optional Render Blueprint — or configure manually using the values below.
services:
  - type: web
    name: contest-hub-api
    runtime: node
    rootDir: api
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
